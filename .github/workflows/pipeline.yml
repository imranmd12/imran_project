name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    # # Grant execute permission to Maven wrapper
    # - name: Grant permission to mvnw
    #   run: chmod +x mvnw
    # Build the project (compile)

    - name: Build with Maven for ai-service
      working-directory: Final Backend/ai-service
      run: mvn clean install

    - name: Build with Maven for api-gateway
      working-directory: Final Backend/api-gateway
      run: mvn clean install

    - name: Build with Maven for auth-service
      working-directory: Final Backend/auth-service
      run: mvn clean install
        
    - name: Build with Maven for common-lib
      working-directory: Final Backend/common-lib
      run: mvn clean install
        
    - name: Build with Maven for discovery-service
      working-directory: Final Backend/discovery-service
      run: mvn clean install
      
    - name: Build with Maven for interaction-service
      working-directory: Final Backend/interaction-service
      run: mvn clean install

    - name: Build with Maven for media-service
      working-directory: Final Backend/media-service
      run: mvn clean install
        
    - name: Build with Maven for post-service
      working-directory: Final Backend/post-service
      run: mvn clean install
        
    - name: Build with Maven for user-service
      working-directory: Final Backend/user-service
      run: mvn clean install