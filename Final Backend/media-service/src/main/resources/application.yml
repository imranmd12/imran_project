server:
  port: 8085

spring:
  application:
    name: media-service
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

app:
  upload-dir: ${UPLOAD_DIR:uploads}
  media-base-url: ${MEDIA_BASE_URL:http://localhost:8085/uploads}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
